<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Unchain - Verify your email</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f5;
            margin: 0;
            padding: 40px 0;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 560px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e5e5e5;
        }
        .header {
            padding: 32px 40px 24px;
            text-align: center;
        }
        .header-logo {
            font-size: 22px;
            font-weight: 800;
            color: #0a0a0a;
            letter-spacing: 0.1em;
            margin: 0;
            text-transform: uppercase;
        }
        .content {
            padding: 0 40px 40px;
            color: #1a1a1a;
        }
        .content h1 {
            margin-top: 0;
            font-size: 24px;
            font-weight: 700;
            color: #0a0a0a;
            text-align: center;
        }
        .content p {
            font-size: 16px;
            line-height: 1.6;
            color: #525252;
            margin-bottom: 24px;
            text-align: center;
        }
        .button-container {
            text-align: center;
            margin: 40px 0;
        }
        .button {
            display: inline-block;
            background-color: #0055ff;
            color: #ffffff !important;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            padding: 16px 36px;
            border-radius: 10px;
            box-shadow: 0 4px 6px -1px rgba(0, 85, 255, 0.2);
        }
        .footer {
            padding: 24px 40px;
            background-color: #fafafa;
            text-align: center;
            font-size: 13px;
            color: #8c8c8c;
            border-top: 1px solid #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2 class="header-logo">UNCHAIN</h2>
        </div>
        <div class="content">
            <h1>Verify your email</h1>
            <p>Welcome to Unchain! Please click the button below to verify your email address and securely log into the portal.</p>
            
            <div class="button-container">
                <!-- This tag is strictly parsed by Supabase -->
                <a href="{{ .ConfirmationURL }}" class="button">Log in to Unchain Admin</a>
            </div>

            <p style="font-size: 14px; color: #737373;">If you didn't request this login email, you can safely ignore it. Your account is secure.</p>
        </div>
        <div class="footer">
            &copy; 2026 Unchain, Inc. All rights reserved.
        </div>
    </div>
</body>
</html>
